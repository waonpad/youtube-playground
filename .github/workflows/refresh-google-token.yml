name: Refresh Google OAuth Token

on:
  workflow_dispatch:
  schedule:
    # 5日ごとに実行
    # Google OAuth テストアプリのリフレッシュトークンは有効期限に余裕を持たせて更新
    - cron: "0 0 */5 * *"

jobs:
  refresh_token:
    runs-on: ubuntu-latest
    # スケジュール実行またはリポジトリオーナーの手動実行のみ許可
    if: github.event_name == 'schedule' || github.triggering_actor ==
      github.repository_owner
    environment: main
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --production --ignore-scripts

      - name: Refresh Google OAuth token and update secret
        env:
          YOUTUBE_DATA_API_REFRESH_TOKEN: ${{ secrets.YOUTUBE_DATA_API_REFRESH_TOKEN }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          # secrets の更新に PAT が必要 (repo スコープ または secrets:write の fine-grained PAT)
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          NEW_TOKEN=$(bun run scripts/refresh-google-token.ts)
          if [ -n "$NEW_TOKEN" ]; then
            echo "::add-mask::$NEW_TOKEN"
            echo "$NEW_TOKEN" | gh secret set YOUTUBE_DATA_API_REFRESH_TOKEN
            echo "リフレッシュトークンを GitHub Secrets に更新しました"
          else
            echo "新しいリフレッシュトークンは発行されませんでした"
            echo "既存のトークンが有効であることは確認できましたが、有効期限に注意してください"
          fi
